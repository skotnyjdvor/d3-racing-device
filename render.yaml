services:
  - type: web
    name: laptrace
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start:render
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: laptrace-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_ORIGIN
        sync: false

databases:
  - name: laptrace-db
    plan: basic-256mb
    region: frankfurt
    postgresMajorVersion: "18"
    ipAllowList: []
